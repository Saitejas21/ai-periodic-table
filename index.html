* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {

.title-block p { font-family:'Space Mono',monospace; font-size:clamp(7px,1.8vw,9px); color:var(--muted); letter-spacing:0.08em; margin-top:3px; }

.search-wrap input:focus { border-color:var(--orange); }
.search-wrap input::placeholder { color:var(--muted); }
.search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:13px; pointer-events:none; }

/* FILTERS */
.filters { display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; scrollbar-width:none; -ms-overflow-style:none; }
.filters::-webkit-scrollbar { display:none; }
.filter-pill { display:flex; align-items:center; gap:5px; padding:5px 11px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.05em; text-transform:uppercase; cursor:pointer; white-space:nowrap; transition:all 0.15s; flex-shrink:0; user-select:none; }
.filter-pill .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.filter-pill.active { background:var(--surface2); color:var(--text); border-color:var(--pill-color,var(--orange)); }
.filter-pill:hover:not(.active) { border-color:var(--muted); color:var(--text); }

/* STATS */
.stats-bar { padding:7px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--dim); }
.stats-bar span { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:0.08em; }
.stats-bar .count { color:var(--orange); font-weight:700; }
.view-toggle { display:flex; gap:4px; }
.view-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:3px 8px; border-radius:3px; cursor:pointer; font-size:11px; font-family:'Space Mono',monospace; transition:all 0.15s; }
.view-btn.active { border-color:var(--orange); color:var(--orange); }

.grid-container { padding:10px 12px; }
.pt-grid { display:grid; grid-template-columns:repeat(18,1fr); gap:3px; }

@media(max-width:900px) {
  .pt-grid { grid-template-columns:repeat(auto-fill,minmax(68px,1fr)); gap:4px; }
  .pt-grid .empty { display:none; }
}
@media(max-width:500px) {
  .pt-grid { grid-template-columns:repeat(auto-fill,minmax(58px,1fr)); gap:3px; }
}
@media(max-width:380px) {
  .pt-grid { grid-template-columns:repeat(auto-fill,minmax(52px,1fr)); gap:2px; }
}

.element { aspect-ratio:0.85; background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:4px 3px 3px; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s,opacity 0.2s; position:relative; display:flex; flex-direction:column; justify-content:space-between; overflow:hidden; min-width:0; }
.element::before { content:''; position:absolute; top:0;left:0;right:0; height:2.5px; background:var(--cat-color); }

.element.empty { background:transparent; border-color:transparent; cursor:default; }
.element.empty:hover { transform:none; box-shadow:none; }

.li-name { font-size:13px; font-weight:600; color:#fff; line-height:1.2; }
.li-desc { font-size:10px; color:var(--muted); margin-top:2px; line-height:1.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.li-cat { font-family:'Space Mono',monospace; font-size:8px; color:var(--cat-color); text-transform:uppercase; letter-spacing:0.05em; flex-shrink:0; display:none; }

.modal { background:var(--surface2); border:1px solid var(--border); border-radius:8px; width:100%; max-width:400px; padding:20px; position:relative; border-top:3px solid var(--cat-color,var(--orange)); animation:slideUp 0.2s ease; }

.modal-close { position:absolute; top:14px;right:14px; background:none;border:none; color:var(--muted);font-size:18px; cursor:pointer;line-height:1; padding:4px; }

.modal-header { display:flex; align-items:flex-start; gap:14px; margin-bottom:14px; }
.modal-symbol { font-weight:900; font-size:54px; color:var(--cat-color,var(--orange)); line-height:1; letter-spacing:-0.03em; }

/* FOOTER */

const ROWS=7,COLS=18;
let activeFilter='ALL',searchQuery='',viewMode='grid';

// Build filters
const filtersEl=document.getElementById('filters');
for(const[key,val]of Object.entries(CATS)){
  const p=document.createElement('div');
  p.className='filter-pill'; p.dataset.cat=key;
  p.style.setProperty('--pill-color',val.color);
  p.innerHTML=`<div class="dot" style="background:${val.color}"></div>${key}`;
  p.addEventListener('click',()=>setFilter(key));
  filtersEl.appendChild(p);
}

// Build grid
const ptGrid=document.getElementById('ptGrid');
const elMap={};
for(const el of E) elMap[`${el[4]}-${el[5]}`]=el;

for(let r=1;r<=ROWS;r++){
  for(let c=1;c<=COLS;c++){
    const el=elMap[`${c}-${r}`];
    const cell=document.createElement('div');
    if(el){
      const[n,sym,name,cat]=el;
      const color=CATS[cat]?.color||'#888';
      cell.className='element';
      cell.dataset.cat=cat; cell.dataset.name=name.toLowerCase(); cell.dataset.sym=sym.toLowerCase();
      cell.style.setProperty('--cat-color',color);
      cell.innerHTML=`<div class="el-num">${String(n).padStart(2,'0')}</div><div class="el-symbol">${sym}</div><div class="el-name">${name}</div><div class="el-cat">${cat}</div>`;
      cell.addEventListener('click',()=>openModal(el));
    } else {
      cell.className='element empty';
    }
    ptGrid.appendChild(cell);
  }
}

// Build list
const listContainer=document.getElementById('listContainer');
for(const el of E){
  const[n,sym,name,cat,,,desc,use]=el;
  const color=CATS[cat]?.color||'#888';
  const item=document.createElement('div');
  item.className='list-item'; item.dataset.cat=cat; item.dataset.name=name.toLowerCase(); item.dataset.sym=sym.toLowerCase();
  item.style.setProperty('--cat-color',color);
  item.innerHTML=`<div class="li-num">${String(n).padStart(2,'0')}</div><div class="li-symbol">${sym}</div><div class="li-info"><div class="li-name">${name}</div><div class="li-desc">${desc}</div></div><div class="li-cat">${cat}</div>`;
  item.addEventListener('click',()=>openModal(el));
  listContainer.appendChild(item);
}

function applyFilters(){
  const gridEls=ptGrid.querySelectorAll('.element:not(.empty)');
  const listEls=listContainer.querySelectorAll('.list-item');
  let count=0;
  function matches(cat,name,sym){
    const catOk=activeFilter==='ALL'||cat===activeFilter;
    const qOk=!searchQuery||name.includes(searchQuery)||sym.includes(searchQuery)||cat.toLowerCase().includes(searchQuery)||CATS[cat]?.label.toLowerCase().includes(searchQuery);
    return catOk&&qOk;
  }
  gridEls.forEach(el=>{
    const ok=matches(el.dataset.cat,el.dataset.name,el.dataset.sym);
    el.classList.toggle('dimmed',!ok);
    if(ok)count++;
  });
  listEls.forEach(el=>{
    const ok=matches(el.dataset.cat,el.dataset.name,el.dataset.sym);
    el.classList.toggle('dimmed',!ok);
  });
  document.getElementById('countEl').textContent=count;
  document.getElementById('noResults').style.display=count===0?'block':'none';
}

function setFilter(cat){
  activeFilter=cat;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.toggle('active',p.dataset.cat===cat));
  applyFilters();
}

// wire up the ALL pill (hardcoded in HTML, needs listener separately)
document.querySelector('.filter-pill[data-cat="ALL"]').addEventListener('click',()=>setFilter('ALL'));

document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value.toLowerCase().trim();
  applyFilters();
});

function setView(v){
  viewMode=v;
  document.getElementById('gridContainer').style.display=v==='grid'?'block':'none';
  document.getElementById('listContainer').style.display=v==='list'?'flex':'none';
  document.getElementById('btnGrid').classList.toggle('active',v==='grid');
  document.getElementById('btnList').classList.toggle('active',v==='list');
  const visibleCount=v==='grid'
    ?ptGrid.querySelectorAll('.element:not(.empty):not(.dimmed)').length
    :listContainer.querySelectorAll('.list-item:not(.dimmed)').length;
  document.getElementById('countEl').textContent=visibleCount;
}

function openModal(el){
  const[n,sym,name,cat,,,desc,use]=el;
  const color=CATS[cat]?.color||'#888';
  const label=CATS[cat]?.label||cat;
  const mc=document.getElementById('modalContent');
  mc.style.setProperty('--cat-color',color);
  document.getElementById('mSym').textContent=sym;
  document.getElementById('mSym').style.color=color;
  document.getElementById('mName').textContent=name;
  document.getElementById('mCat').textContent=label;
  document.getElementById('mNum').textContent=`Element #${String(n).padStart(3,'0')}`;
  document.getElementById('mDesc').textContent=desc;
  document.getElementById('mUse').textContent=use;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modal'))return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
});
</script>
