<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table of AI Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0e1318;
    --border: #1e2a35;
    --text: #c8d8e8;
    --muted: #5a7080;
    --accent: #e8a020;

    /* Category colors */
    --llm: #e85d20;
    --coding: #20b8e8;
    --image: #9b59e8;
    --video: #e8205d;
    --audio: #20e8a0;
    --search: #e8d820;
    --agents: #e85d20;
    --automation: #20e860;
    --productivity: #5d9be8;
    --data: #e820b8;
    --design: #ff8c42;
    --research: #42d4e8;
    --writing: #a8e842;
    --infra: #e84242;
    --voice: #c842e8;
    --multimodal: #ffb830;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 20px 60px;
    overflow-x: auto;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .page-header {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }

  .page-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 6vw, 80px);
    letter-spacing: 0.12em;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 60px rgba(232,160,32,0.3);
  }

  .page-header p {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: color 0.2s;
  }

  .legend-item:hover { color: var(--text); }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 1px;
    flex-shrink: 0;
  }

  .table-wrapper {
    position: relative;
    z-index: 1;
    overflow-x: auto;
    padding-bottom: 16px;
  }

  .pt-grid {
    display: grid;
    grid-template-columns: repeat(18, 1fr);
    gap: 4px;
    min-width: 1200px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .element {
    aspect-ratio: 0.9;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 5px 4px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }

  .element::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    right: 0;
    height: 2px;
    background: var(--cat-color, #444);
    opacity: 0.9;
  }

  .element:hover {
    border-color: var(--cat-color, #888);
    background: #141c24;
    transform: scale(1.08) translateY(-2px);
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 0 1px var(--cat-color, #888);
  }

  .el-num {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    line-height: 1;
  }

  .el-symbol {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--cat-color, #fff);
    line-height: 1;
    text-align: center;
    letter-spacing: 0.02em;
    text-shadow: 0 0 20px var(--cat-color, transparent);
  }

  .el-name {
    font-size: 7.5px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    line-height: 1.2;
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .el-cat {
    font-family: 'Space Mono', monospace;
    font-size: 6px;
    color: var(--muted);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .empty { background: transparent; border-color: transparent; }
  .empty:hover { transform: none; box-shadow: none; }

  .section-label {
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px dashed #1a2530;
    border-radius: 3px;
    aspect-ratio: 0.9;
  }

  .section-label span {
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    color: #2a3a48;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* Tooltip */
  .tooltip {
    display: none;
    position: fixed;
    background: #0a1018;
    border: 1px solid var(--cat-color, #333);
    border-radius: 6px;
    padding: 14px 16px;
    width: 260px;
    z-index: 1000;
    box-shadow: 0 16px 48px rgba(0,0,0,0.8);
    pointer-events: none;
  }

  .tooltip.visible { display: block; }

  .tt-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }

  .tt-symbol {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--cat-color, #fff);
    line-height: 1;
    text-shadow: 0 0 24px var(--cat-color, transparent);
  }

  .tt-info { flex: 1; }
  .tt-name { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.2; }
  .tt-cat { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
  .tt-num { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); }

  .tt-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    border-top: 1px solid #1a2530;
    padding-top: 10px;
  }

  .tt-use {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    margin-top: 8px;
  }

  .divider-row {
    grid-column: 1 / -1;
    height: 12px;
  }

  @media (max-width: 900px) {
    .pt-grid { min-width: 900px; gap: 3px; }
    .el-symbol { font-size: 18px; }
    .el-name { font-size: 6.5px; }
  }
</style>
</head>

// Build legend
const legendEl = document.getElementById('legend');
for (const [key, val] of Object.entries(CATEGORIES)) {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${val.color}"></div>${val.label}`;
  legendEl.appendChild(item);
}

// Build grid
const grid = document.getElementById('grid');
const ROWS = 7;
const COLS = 18;

// Create a map for fast lookup
const elementMap = {};
for (const el of ELEMENTS) {
  elementMap[`${el.row}-${el.col}`] = el;
}

for (let r = 1; r <= ROWS; r++) {
  for (let c = 1; c <= COLS; c++) {
    const el = elementMap[`${r}-${c}`];
    const cell = document.createElement('div');

    if (el) {
      const cat = CATEGORIES[el.cat];
      const color = cat ? cat.color : '#888';
      cell.className = 'element';
      cell.style.setProperty('--cat-color', color);
      cell.innerHTML = `
        <div class="el-num">${String(el.n).padStart(2,'0')}</div>
        <div class="el-symbol">${el.sym}</div>
        <div class="el-name">${el.name}</div>
        <div class="el-cat">${cat ? cat.label : el.cat}</div>
      `;
      cell.addEventListener('mouseenter', (e) => showTooltip(e, el, color));
      cell.addEventListener('mouseleave', hideTooltip);
      cell.addEventListener('mousemove', moveTooltip);
    } else {
      cell.className = 'element empty';
    }

    grid.appendChild(cell);
  }
}

// Tooltip logic
const tooltip = document.getElementById('tooltip');
let activeColor = '#888';

function showTooltip(e, el, color) {
  activeColor = color;
  const cat = CATEGORIES[el.cat];
  tooltip.style.setProperty('--cat-color', color);
  tooltip.innerHTML = `
    <div class="tt-header">
      <div class="tt-symbol">${el.sym}</div>
      <div class="tt-info">
        <div class="tt-name">${el.name}</div>
        <div class="tt-cat">${cat ? cat.label : el.cat}</div>
        <div class="tt-num">Element #${el.n}</div>
      </div>
    </div>
    <div class="tt-desc">${el.desc}</div>
    <div class="tt-use">⚡ ${el.use}</div>
  `;
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

function moveTooltip(e) {
  const tw = 260;
  const th = 180;
  let x = e.clientX + 16;
  let y = e.clientY - 20;
  if (x + tw > window.innerWidth) x = e.clientX - tw - 16;
  if (y + th > window.innerHeight) y = e.clientY - th;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
</script>
